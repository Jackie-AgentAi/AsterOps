#version: '3.8'

services:
  # Nginx反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - user-service
    networks:
      - llmops-network
    restart: unless-stopped


  # 用户权限服务
  user-service:
    build: ./services/user-service
    ports:
      - "8081:8081"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=llmops
      - DATABASE_USER=llmops
      - DATABASE_PASSWORD=llmops123
      - REDIS_ADDR=redis:6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    volumes:
      - ./services/user-service/configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      consul:
        condition: service_started
    networks:
      - llmops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 项目管理服务
  project-service:
    build: ./services/project-service
    ports:
      - "8082:8082"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=llmops
      - DATABASE_USER=llmops
      - DATABASE_PASSWORD=llmops123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    depends_on:
      - postgres
      - redis
      - consul
    networks:
      - llmops-network
    restart: unless-stopped

  # 模型管理服务
  model-service:
    build:
      context: ./services/model-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=model_db
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    volumes:
      - model_storage:/app/storage
      - model_uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - consul
    networks:
      - llmops-network
    restart: unless-stopped

  # 推理服务
  inference-service:
    build: ./services/inference-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=inference_db
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    volumes:
      - inference_cache:/app/cache
      - inference_models:/app/models
      - inference_logs:/app/logs
    depends_on:
      - postgres
      - redis
      - consul
    networks:
      - llmops-network
    restart: unless-stopped

  # 成本管理服务
  cost-service:
    build:
      context: ./services/cost-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cost_db
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    depends_on:
      - postgres
      - redis
      - consul
    networks:
      - llmops-network
    restart: unless-stopped

  # 监控服务
  monitoring-service:
    build:
      context: ./services/monitoring-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=monitoring_db
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - PROMETHEUS_HOST=prometheus
      - PROMETHEUS_PORT=9090
      - GRAFANA_HOST=grafana
      - GRAFANA_PORT=3000
    volumes:
      - monitoring_data:/app/data
      - monitoring_logs:/app/logs
    depends_on:
      - postgres
      - redis
      - consul
      - prometheus
      - grafana
    networks:
      - llmops-network
    restart: unless-stopped

  # 基础设施服务
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=llmops
      - POSTGRES_USER=llmops
      - POSTGRES_PASSWORD=llmops123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/user-service/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - llmops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmops -d llmops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - llmops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  consul:
    image: consul:1.15.4
    ports:
      - "8500:8500"
    command: consul agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -data-dir=/consul/data
    volumes:
      - consul_data:/consul/data
    networks:
      - llmops-network
    restart: unless-stopped

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - llmops-network
    restart: unless-stopped

  # API网关服务
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8087:8087"
    environment:
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=llmops
      - DB_USER=llmops
      - DB_PASSWORD=llmops123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_started
    networks:
      - llmops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 管理后台前端
  admin-frontend:
    build:
      context: ./frontend/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:8087/api
      - VITE_GATEWAY_URL=http://localhost:8087
      - VITE_WS_URL=ws://localhost:8087/ws
    depends_on:
      - api-gateway
    networks:
      - llmops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 用户门户前端
  user-portal-frontend:
    build:
      context: ./frontend/user-portal
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:8081/api
      - VITE_GATEWAY_URL=http://localhost:8081
      - VITE_WS_URL=ws://localhost:8081/ws
    depends_on:
      - user-service
    networks:
      - llmops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 移动端前端
  mobile-frontend:
    build:
      context: ./frontend/mobile-app
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:8081/api
      - VITE_GATEWAY_URL=http://localhost:8081
      - VITE_WS_URL=ws://localhost:8081/ws
    depends_on:
      - user-service
    networks:
      - llmops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # 监控系统
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - llmops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - llmops-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  consul_data:
  minio_data:
  model_storage:
  model_uploads:
  inference_cache:
  inference_models:
  inference_logs:
  monitoring_data:
  monitoring_logs:
  grafana_data:

networks:
  llmops-network:
    driver: bridge
