events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # 上游服务配置
    upstream api_gateway {
        server api-gateway:8080;
    }

    upstream user_service {
        server user-service:8081;
    }

    upstream project_service {
        server project-service:8082;
    }

    upstream model_service {
        server model-service:8083;
    }

    upstream inference_service {
        server inference-service:8084;
    }

    upstream cost_service {
        server cost-service:8085;
    }

    upstream monitoring_service {
        server monitoring-service:8086;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream consul {
        server consul:8500;
    }

    server {
        listen 80;
        server_name 172.16.10.3;

        # 静态资源 - CSS, JS, 图片等
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 管理后台前端 - 直接提供静态文件
        location /admin/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /admin/index.html;
            index index.html;
        }

        # 用户门户前端 - 暂时代理到管理后台
        location /portal/ {
            proxy_pass http://172.16.10.3:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 移动端前端 - 直接提供静态文件
        location /mobile/ {
            alias /usr/share/nginx/html/mobile-app/;
            try_files $uri $uri/ /mobile/index.html;
            index index.html;
        }

        # 默认重定向到管理后台
        location / {
            return 301 /admin/;
        }

        # API网关
        location /api/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 直接访问微服务
        location /user/ {
            proxy_pass http://user_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /project/ {
            proxy_pass http://project_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /model/ {
            proxy_pass http://model_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /inference/ {
            proxy_pass http://inference_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /cost/ {
            proxy_pass http://cost_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /monitoring/ {
            proxy_pass http://monitoring_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 监控服务
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /consul/ {
            proxy_pass http://consul/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
