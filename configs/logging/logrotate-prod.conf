# 生产环境日志轮转配置
# 适用于logrotate

# 应用日志轮转
/app/logs/application.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0644 root root
    postrotate
        # 发送USR1信号给应用进程以重新打开日志文件
        kill -USR1 $(cat /var/run/llmops-application.pid 2>/dev/null) 2>/dev/null || true
    endscript
}

