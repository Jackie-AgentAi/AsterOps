# Fluentd生产环境配置
# 用于日志聚合和转发

<source>
  @type tail
  @id input_tail
  path /app/logs/*.log
  pos_file /var/log/fluentd/application.log.pos
  tag application.*
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
</source>

<source>
  @type tail
  @id input_error_tail
  path /app/logs/error.log
  pos_file /var/log/fluentd/error.log.pos
  tag error.*
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
</source>

<source>
  @type tail
  @id input_access_tail
  path /app/logs/access.log
  pos_file /var/log/fluentd/access.log.pos
  tag access.*
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
</source>

<source>
  @type tail
  @id input_security_tail
  path /app/logs/security.log
  pos_file /var/log/fluentd/security.log.pos
  tag security.*
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
</source>

# 过滤配置
<filter application.**>
  @type record_transformer
  <record>
    service_name ${tag_parts[1]}
    log_type application
    environment production
  </record>
</filter>

<filter error.**>
  @type record_transformer
  <record>
    service_name ${tag_parts[1]}
    log_type error
    environment production
    severity ERROR
  </record>
</filter>

<filter access.**>
  @type record_transformer
  <record>
    service_name ${tag_parts[1]}
    log_type access
    environment production
  </record>
</filter>

<filter security.**>
  @type record_transformer
  <record>
    service_name ${tag_parts[1]}
    log_type security
    environment production
    severity WARNING
  </record>
</filter>

# 输出到Elasticsearch (可选)
<match application.**>
  @type elasticsearch
  @id out_es_application
  @log_level info
  include_tag_key true
  host elasticsearch
  port 9200
  index_name llmops-logs
  type_name application
  <buffer>
    @type file
    path /var/log/fluentd/buffers/application
    flush_mode interval
    flush_interval 5s
    chunk_limit_size 2M
    queue_limit_length 8
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

<match error.**>
  @type elasticsearch
  @id out_es_error
  @log_level info
  include_tag_key true
  host elasticsearch
  port 9200
  index_name llmops-error-logs
  type_name error
  <buffer>
    @type file
    path /var/log/fluentd/buffers/error
    flush_mode interval
    flush_interval 1s
    chunk_limit_size 1M
    queue_limit_length 4
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

<match access.**>
  @type elasticsearch
  @id out_es_access
  @log_level info
  include_tag_key true
  host elasticsearch
  port 9200
  index_name llmops-access-logs
  type_name access
  <buffer>
    @type file
    path /var/log/fluentd/buffers/access
    flush_mode interval
    flush_interval 10s
    chunk_limit_size 2M
    queue_limit_length 8
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

<match security.**>
  @type elasticsearch
  @id out_es_security
  @log_level info
  include_tag_key true
  host elasticsearch
  port 9200
  index_name llmops-security-logs
  type_name security
  <buffer>
    @type file
    path /var/log/fluentd/buffers/security
    flush_mode interval
    flush_interval 1s
    chunk_limit_size 1M
    queue_limit_length 4
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

# 输出到文件 (备用)
<match **>
  @type file
  @id out_file
  path /var/log/fluentd/output
  append true
  <buffer>
    @type file
    path /var/log/fluentd/buffers/file
    flush_mode interval
    flush_interval 30s
    chunk_limit_size 10M
    queue_limit_length 32
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>
