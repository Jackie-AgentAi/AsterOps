global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Consul服务发现
  - job_name: 'consul'
    consul_sd_configs:
      - server: 'consul:8500'
        services: []
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job
      - source_labels: [__meta_consul_service_id]
        target_label: instance
      - source_labels: [__meta_consul_tags]
        target_label: tags
        regex: '.*,monitoring,.*'
        action: keep

  # API网关监控
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 用户服务监控
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8081']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 模型服务监控
  - job_name: 'model-service'
    static_configs:
      - targets: ['model-service:8083']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 推理服务监控
  - job_name: 'inference-service'
    static_configs:
      - targets: ['inference-service:8084']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 成本服务监控
  - job_name: 'cost-service'
    static_configs:
      - targets: ['cost-service:8085']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 监控服务监控
  - job_name: 'monitoring-service'
    static_configs:
      - targets: ['monitoring-service:8086']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 项目服务监控
  - job_name: 'project-service'
    static_configs:
      - targets: ['project-service:8082']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 数据库监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node Exporter (系统监控)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # cAdvisor (容器监控)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s



