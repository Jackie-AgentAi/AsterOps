# Nginx安全配置
# 生产环境安全加固配置

# 隐藏Nginx版本信息
server_tokens off;

# 安全头配置
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# 限制请求大小
client_max_body_size 100M;
client_body_buffer_size 128k;
client_header_buffer_size 1k;
large_client_header_buffers 4 4k;

# 超时配置
client_body_timeout 12;
client_header_timeout 12;
keepalive_timeout 15;
send_timeout 10;

# 连接限制
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;

# 限制并发连接数
limit_conn conn_limit_per_ip 20;

# 限制请求频率
limit_req zone=req_limit_per_ip burst=20 nodelay;

# 禁止访问敏感文件
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问备份文件
location ~ \.(bak|backup|old|orig|save|swp|tmp)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问配置文件
location ~ \.(conf|config|ini|log|sql)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问版本控制文件
location ~ /\.(git|svn|hg) {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问临时文件
location ~ /\.(DS_Store|Thumbs\.db) {
    deny all;
    access_log off;
    log_not_found off;
}

# 限制HTTP方法
if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
    return 405;
}

# 防止SQL注入
location ~* (\<|%3C).*script.*(\>|%3E) {
    return 403;
}

# 防止XSS攻击
location ~* (\<|%3C).*script.*(\>|%3E) {
    return 403;
}

# 防止目录遍历
location ~* \.\./ {
    return 403;
}

# 防止访问敏感路径
location ~* /(admin|config|database|logs|backup)/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 限制User-Agent
if ($http_user_agent ~* (bot|crawler|spider|scraper)) {
    return 403;
}

# 限制空User-Agent
if ($http_user_agent = "") {
    return 403;
}

# 防止恶意请求
location ~* \.(php|asp|aspx|jsp)$ {
    return 403;
}

# 限制文件上传
location ~* \.(exe|bat|cmd|com|pif|scr|vbs|js)$ {
    return 403;
}

# 防止热链接
location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
    valid_referers none blocked server_names *.yourdomain.com;
    if ($invalid_referer) {
        return 403;
    }
}

# 限制访问频率
location / {
    limit_req zone=req_limit_per_ip burst=20 nodelay;
    limit_conn conn_limit_per_ip 20;
}

# 健康检查端点
location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# 禁止访问敏感端点
location ~* /(health|status|metrics|debug|test) {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
}

# 日志格式
log_format security '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_x_forwarded_for" $request_time '
                    '$upstream_response_time';

# 访问日志
access_log /var/log/nginx/access.log security;
error_log /var/log/nginx/error.log warn;

# 错误页面
error_page 400 401 403 404 405 500 502 503 504 /error.html;
location = /error.html {
    root /usr/share/nginx/html;
    internal;
}

# 防止信息泄露
server {
    listen 80 default_server;
    server_name _;
    return 444;
}







