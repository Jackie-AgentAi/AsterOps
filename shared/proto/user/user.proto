syntax = "proto3";

package user;

option go_package = "github.com/llmops/shared/proto/user";

// 用户服务gRPC定义
service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
}

// 请求消息
message GetUserRequest {
  string user_id = 1;
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string tenant_id = 4;
}

message UpdateUserRequest {
  string user_id = 1;
  string username = 2;
  string email = 3;
  bool is_active = 4;
}

message DeleteUserRequest {
  string user_id = 1;
}

message ListUsersRequest {
  string tenant_id = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message AuthenticateRequest {
  string username = 1;
  string password = 2;
}

// 响应消息
message GetUserResponse {
  User user = 1;
  bool success = 2;
  string error = 3;
}

message CreateUserResponse {
  User user = 1;
  bool success = 2;
  string error = 3;
}

message UpdateUserResponse {
  User user = 1;
  bool success = 2;
  string error = 3;
}

message DeleteUserResponse {
  bool success = 1;
  string error = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
  bool success = 3;
  string error = 4;
}

message AuthenticateResponse {
  string token = 1;
  User user = 2;
  bool success = 3;
  string error = 4;
}

// 数据模型
message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string tenant_id = 4;
  bool is_active = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}



