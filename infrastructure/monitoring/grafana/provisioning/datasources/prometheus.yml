# Grafana数据源配置
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
      manageAlerts: true
      alertmanagerUid: "alertmanager"
    secureJsonData:
      basicAuthPassword: ""
    version: 1

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: true
    jsonData:
      implementation: "prometheus"
    version: 1

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: llmops
    user: llmops_prod
    secureJsonData:
      password: "LLMOps_Prod_2024!@#Secure"
    jsonData:
      sslmode: "require"
      maxOpenConns: 100
      maxIdleConns: 10
      connMaxLifetime: 14400
    version: 1

  - name: Redis
    type: redis
    access: proxy
    url: redis:6379
    jsonData:
      client: "standalone"
      poolSize: 10
      timeout: 5
    secureJsonData:
      password: "Redis_Prod_2024!@#Secure"
    version: 1
