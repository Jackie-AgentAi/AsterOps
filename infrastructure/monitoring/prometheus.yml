global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'llmops-services'
    static_configs:
      - targets: 
        - 'user-service:8081'
        - 'model-service:8083'
        - 'inference-service:8084'
        - 'cost-service:8085'
        - 'monitoring-service:8086'
        - 'api-gateway:8080'
    metrics_path: '/metrics'
    scrape_interval: 30s


